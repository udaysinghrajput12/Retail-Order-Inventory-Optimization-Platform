<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Retail Analytics</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#/">
                <i class="fa-solid fa-chart-pie me-2"></i>Retail Analytics
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav" id="main-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="#/" data-link>Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#/products" data-link>Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#/inventory" data-link>Inventory</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#/suppliers" data-link>Suppliers</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#/orders" data-link>Orders</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Notification Area -->
    <div id="notification-area"></div>

    <!-- Main Content Container (SPA) -->
    <main id="app" class="container mt-4"></main>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Core App Scripts -->
    <script src="js/api.js"></script>
    <script src="js/views.js"></script>
    
    <!-- Page Logic Controllers (To be loaded BEFORE router) -->
    <script src="js/dashboard.js"></script>
    <script src="js/products.js"></script>
    <script src="js/inventory.js"></script>
    <script src="js/suppliers.js"></script>
    <script src="js/orders.js"></script>

    <!-- SPA Router (Entry Point) -->
    <script src="js/router.js"></script>
</body>
</html>
